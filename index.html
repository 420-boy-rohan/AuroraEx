<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROHAN App</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #clock {
            position: absolute;
            top: 10px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 24px;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>
    <iframe src="https://h5.auroraex.net/#/pages/index/index" title="Calculator"></iframe>

    <script>
        let serverTimeOffset = 0;

        // অনলাইন টাইম সার্ভার থেকে সময় সিঙ্ক্রোনাইজ করা
        async function syncTime() {
            try {
                const response = await fetch('https://worldtimeapi.org/api/ip');
                const data = await response.json();
                const serverTime = new Date(data.datetime).getTime();
                const localTime = new Date().getTime();
                serverTimeOffset = serverTime - localTime;
            } catch (error) {
                console.error("টাইম সিঙ্ক্রোনাইজেশনে সমস্যা হয়েছে:", error);
            }
        }

        function updateClock() {
            const now = new Date(new Date().getTime() + serverTimeOffset);
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }

        // প্রতি ১ সেকেন্ডে ঘড়ি আপডেট
        setInterval(updateClock, 1000);
        
        // প্রতি ১০ মিনিট পর পর সার্ভারের সাথে সময় পুনরায় সিঙ্ক করা
        setInterval(syncTime, 600000);
        
        syncTime();
        updateClock();
    </script>

</body>
</html>
