<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROHAN App</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* ঘড়ির স্টাইল - ফন্ট সাইজ বৃদ্ধি করা হয়েছে */
        #clock {
            position: absolute;
            top: 10px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 24px;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>
    <iframe src="https://h5.auroraex.net/#/pages/index/index" title="Calculator"></iframe>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
